<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sawit Secure Gateway | NyawitSMP</title>
    <style>
        :root {
            --neon-green: #39ff14;
            --dark-palm: #050a05;
        }

        * {
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background-color: var(--dark-palm);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(57, 255, 20, 0.05) 0%, transparent 20%),
                radial-gradient(circle at 90% 80%, rgba(57, 255, 20, 0.05) 0%, transparent 20%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: #ffffff;
            overflow: hidden;
        }

        /* Container Animasi */
        .intro-container {
            text-align: center;
            position: relative;
        }

        /* Teks Utama dengan Efek Glow & Glitch */
        .animated-text {
            font-size: 3.5rem;
            font-weight: 900;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 8px;
            margin: 0;
            position: relative;
            
            /* Animasi Masuk dan Efek Glow */
            animation: 
                cyberPulse 2s infinite alternate,
                glitchReveal 1.5s ease-out forwards;
        }

        /* Sub-teks Animasi */
        .animated-subtext {
            font-size: 1rem;
            color: var(--neon-green);
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-top: 10px;
            opacity: 0;
            
            /* Muncul sedikit terlambat setelah teks utama */
            animation: fadeInSub 1s ease-out 0.8s forwards;
        }

        /* --- KEYFRAMES ANIMATION --- */
        
        /* 1. Animasi Membuka / Reveal */
        @keyframes glitchReveal {
            0% {
                transform: scale(0.8);
                letter-spacing: -10px;
                opacity: 0;
                filter: blur(10px);
            }
            60% {
                transform: scale(1.05);
                letter-spacing: 12px;
                opacity: 0.8;
                filter: blur(0px);
            }
            100% {
                transform: scale(1);
                letter-spacing: 8px;
                opacity: 1;
            }
        }

        /* 2. Animasi Denyut Cahaya (Neon Glow Pulse) */
        @keyframes cyberPulse {
            0% {
                text-shadow: 
                    0 0 4px #fff,
                    0 0 10px var(--neon-green),
                    0 0 20px var(--neon-green);
            }
            100% {
                text-shadow: 
                    0 0 8px #fff,
                    0 0 20px var(--neon-green),
                    0 0 40px var(--neon-green),
                    0 0 60px rgba(57, 255, 20, 0.5);
            }
        }

        /* 3. Animasi Muncul untuk Sub-teks */
        @keyframes fadeInSub {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

<div class="intro-container">
    <!-- Teks Utama Animasi -->
    <h1 class="animated-text">NYAWIT HOST</h1>
    <!-- Sub-teks Status -->
    <div class="animated-subtext">Connecting to Server...</div>
</div>

<script>
    // Jalankan pengalihan otomatis setelah animasi selesai
    window.onload = function() {
        // 30000 milidetik = 3 detik (memberikan waktu untuk menikmati animasi intro)
        setTimeout(() => {
            window.location.href = "http://hosting3.nyawitsmp.fun:19100/";
        }, 3000);
    };
</script>

</body>
</html>

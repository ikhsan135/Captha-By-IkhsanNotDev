<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sawit Secure Gateway | NyawitSMP</title>
    <style>
        :root {
            --neon-green: #39ff14;
            --dark-palm: #050a05;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --error-red: #ff3131;
        }

        * {
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background-color: var(--dark-palm);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(57, 255, 20, 0.05) 0%, transparent 20%),
                radial-gradient(circle at 90% 80%, rgba(57, 255, 20, 0.05) 0%, transparent 20%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: #ffffff;
            overflow: hidden;
        }

        .captcha-card {
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(57, 255, 20, 0.2);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5), 0 0 20px rgba(57, 255, 20, 0.05);
            width: 100%;
            max-width: 400px;
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .brand-header {
            margin-bottom: 30px;
        }

        .brand-header h1 {
            font-size: 1.5rem;
            margin: 0;
            color: var(--neon-green);
            text-transform: uppercase;
            letter-spacing: 5px;
            text-shadow: 0 0 10px rgba(57, 255, 20, 0.6);
        }

        .brand-header p {
            font-size: 0.8rem;
            color: #888;
            margin-top: 5px;
        }

        /* Display Area */
        #captcha-display {
            background: rgba(0, 0, 0, 0.5);
            height: 100px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 12px;
            margin-bottom: 25px;
            border: 1px inset rgba(57, 255, 20, 0.1);
            position: relative;
            overflow: hidden;
        }

        .char-unit {
            display: inline-block;
            font-size: 32px;
            font-weight: 900;
            color: var(--neon-green);
            margin: 0 4px;
            text-shadow: 2px 2px 10px rgba(0, 0, 0, 1);
        }

        .instruction {
            font-size: 0.75rem;
            color: #aaa;
            margin-bottom: 10px;
            display: block;
        }

        input[type="text"] {
            width: 100%;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(57, 255, 20, 0.3);
            border-radius: 12px;
            color: #fff;
            text-align: center;
            font-size: 1.1rem;
            outline: none;
            transition: 0.3s;
            font-family: 'Courier New', Courier, monospace;
        }

        input[type="text"]:focus {
            border-color: var(--neon-green);
            box-shadow: 0 0 15px rgba(57, 255, 20, 0.2);
            background: rgba(255, 255, 255, 0.08);
        }

        .action-btns {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        button {
            flex: 1;
            padding: 14px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.9rem;
            text-transform: uppercase;
            transition: all 0.3s ease;
            border: none;
        }

        .btn-verify {
            background: var(--neon-green);
            color: #000;
        }

        .btn-verify:hover {
            box-shadow: 0 0 25px var(--neon-green);
            transform: scale(1.02);
        }

        .btn-refresh {
            background: transparent;
            border: 1px solid var(--neon-green);
            color: var(--neon-green);
        }

        .btn-refresh:hover {
            background: rgba(57, 255, 20, 0.1);
        }

        #status-msg {
            margin-top: 20px;
            font-size: 0.85rem;
            min-height: 20px;
            font-weight: 500;
        }

        /* Noise effect for bot protection */
        .noise-line {
            position: absolute;
            background: var(--neon-green);
            opacity: 0.2;
            height: 1px;
            width: 120%;
            pointer-events: none;
        }
    </style>
</head>
<body>

<div class="captcha-card">
    <div class="brand-header">
        <h1>NYAWIT</h1>
        <p>System Security Verification</p>
    </div>

    <span class="instruction" id="mode-text">Type the characters you see</span>
    
    <div id="captcha-display">
        </div>

    <input type="text" id="userInput" placeholder="ENTER CODE" autocomplete="off">

    <div class="action-btns">
        <button class="btn-refresh" onclick="initSystem()">REFRESH</button>
        <button class="btn-verify" onclick="validate()">VERIFY</button>
    </div>

    <div id="status-msg"></div>
</div>

<script>
    let solution = "";
    const display = document.getElementById('captcha-display');
    const input = document.getElementById('userInput');
    const status = document.getElementById('status-msg');
    const modeText = document.getElementById('mode-text');

    function initSystem() {
        display.innerHTML = "";
        input.value = "";
        status.innerText = "";
        status.style.color = "white";
        
        // Randomize antara 3 tipe (0: Alphanumeric, 1: Math, 2: Pattern)
        const type = Math.floor(Math.random() * 3);

        if (type === 0) {
            renderAlpha();
        } else if (type === 1) {
            renderMath();
        } else {
            renderPattern();
        }
        
        // Tambahkan garis noise dekoratif
        for(let i=0; i<3; i++) {
            let line = document.createElement('div');
            line.className = "noise-line";
            line.style.top = Math.random() * 100 + "%";
            line.style.left = "-10%";
            line.style.transform = `rotate(${Math.random() * 20 - 10}deg)`;
            display.appendChild(line);
        }
    }

    function renderAlpha() {
        modeText.innerText = "Type the distorted characters";
        const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
        solution = "";
        for (let i = 0; i < 6; i++) {
            let char = chars.charAt(Math.floor(Math.random() * chars.length));
            solution += char;
            createCharElement(char, true);
        }
    }

    function renderMath() {
        modeText.innerText = "Solve the mathematical expression";
        let v1 = Math.floor(Math.random() * 50) + 1;
        let v2 = Math.floor(Math.random() * 40) + 1;
        solution = (v1 + v2).toString();
        
        let exp = `${v1} + ${v2}`;
        exp.split('').forEach(c => createCharElement(c, false));
    }

    function renderPattern() {
    modeText.innerText = "Salin simbol unik berikut";
    // Pakai karakter yang ada di keyboard tapi tetep acak
    const syms = ["@", "#", "$", "%", "&", "*", "=", "+", "?"];
    solution = "";
    for (let i = 0; i < 5; i++) {
        let s = syms[Math.floor(Math.random() * syms.length)];
        solution += s;
        createCharElement(s, true); // Kasih distorsi biar bot pusing
    }
}

    function createCharElement(char, distort) {
        let span = document.createElement('span');
        span.className = "char-unit";
        span.innerText = char;
        if (distort) {
            const rot = Math.floor(Math.random() * 60) - 30;
            const trans = Math.floor(Math.random() * 10) - 5;
            span.style.transform = `rotate(${rot}deg) translateY(${trans}px)`;
            span.style.opacity = Math.random() * 0.4 + 0.6;
        }
        display.appendChild(span);
    }

    function validate() {
        const userVal = input.value.trim();
        
        if (userVal.toLowerCase() === solution.toLowerCase()) {
            status.style.color = "#39ff14";
            status.innerText = "✓ ACCESS GRANTED. PROCEEDING...";
            
            // Effect sebelum redirect
            document.querySelector('.captcha-card').style.boxShadow = "0 0 50px rgba(57, 255, 20, 0.4)";
            
            setTimeout(() => {
                window.location.href = "http://hosting3.nyawitsmp.fun:19100/";
            }, 1200);
        } else {
            status.style.color = "#ff3131";
            status.innerText = "✗ VERIFICATION FAILED. RESETTING...";
            input.style.borderColor = "#ff3131";
            
            setTimeout(() => {
                input.style.borderColor = "rgba(57, 255, 20, 0.3)";
                initSystem();
            }, 1000);
        }
    }

    // Jalankan saat startup
    window.onload = initSystem;
    
    // Support Enter Key
    input.addEventListener("keypress", function(event) {
        if (event.key === "Enter") {
            validate();
        }
    });
</script>

</body>
</html>
